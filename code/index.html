<!DOCTYPE html>
<html lang="en">

          <head>
                    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
                              rel="stylesheet">
                    <meta charset="UTF-8">
                    <link rel="shortcut icon" href="./img/logo.svg" type="image/x-icon">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Document</title>
                    <link rel="stylesheet" href="style.css">
          </head>

          <body>
                    <header>
                              <div><img src="./img/logo.svg" alt=""></div>
                              <div><img src="./img/moon.png" alt=""></div>

                    </header>
                    <main>
                              <h1>Roll <span>Any</span> Dice</h1>
                              <p>Fast,Simple,and Random dice rolls for all games.</p>
                              <div id="dice_img">
                                        <img src="./img/white dice.png" alt="">
                                        <img src="./img/orange dice.png" alt="">

                              </div>
                              <h2 id="outputNum"></h2>
                              <div id="buttonContainer">
                                        <button onclick="rollDice()" > <img src="./img/dice icon.webp" alt="">Roll Dice</button>
                                        <input  max="7" min="1" id="NumOfDice" placeholder="No. Dice" type="number">
                              </div>
                              <h6> Quick Select</h6>
                              <div id="diceDBtn">
                                        <button><img src="./img/dice-d4.png">d4</button>
                                        <button><img src="./img/dice-d6.png">d6</button>
                                        <button><img src="./img/dice-d8.png">d8</button>
                                        <button><img src="./img/dice-d10.png">d10</button>

                              </div>
                              <div id="rollHistory">
                                        <div id="rollhead">
                                                  <h3>Roll History</h3>
                                                  <a href=" "> Clear history</a>
                                        </div>
                              </div>

                    </main>












                    <script src="app.js"></script>
          </body>

</html>
