<!DOCTYPE html>
<html lang="en">

          <head>
                    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
                              rel="stylesheet">
                    <meta charset="UTF-8">
                    <link rel="shortcut icon" href="./img/logo.svg" type="image/x-icon">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <title>Dicer</title>
                    <link rel="stylesheet" href="style.css">
          </head>

          <body class="themeBg">
                    <header class="themeBg">
                              <div id="logoContainer"><img src="./img/logo-light.svg" alt=""></div>
                              <div id="themeContainer" onclick="switchTheme()"><img src="./img/moon.png" alt=""></div>

                    </header>
                    <main>
                              <h1 class="theme">Roll <span>Any</span> Dice</h1>
                              <p class="theme">Fast,Simple,and Random dice rolls for all games.</p>
                              <div id="dice_img">
                                        <img src="./img/white dice.png" alt="">
                                        <img src="./img/orange dice.png" alt="">

                              </div>
                              <div id="outputNumContainer">
                                        <h2 class="theme" > output</h2>
                              </div>

                              <div id="buttonContainer">
                                        <button id="rollbutton" onclick="rollDice()"> <img src="./img/dice icon.webp" alt="">RollDice</button>
                                        <input class="button"   max="7" min="1" id="NumOfDice" placeholder="No. Dice" type="number">
                              </div>
                              <h6 class="theme"> Quick Select</h6>
                              <div id="diceDBtn">
                                        <button class="button" id="d4Btn" onclick="d4()"><img src="./img/dice-d4.png">d4</button>
                                        <button class="button" id="d6Btn" onclick="d6()"><img src="./img/dice-d6.png">d6</button>
                                        <button class="button" id="d8Btn" onclick="d8()"><img src="./img/dice-d8.png">d8</button>
                                        <button class="button" id="d10Btn" onclick="d10()"><img src="./img/dice-d10.png">d10</button>
                                        <button class="button" id="d12Btn" onclick="d12()"><img src="./img/dice-d10.png">d12</button>

                              </div>
                              <div class="themeBg" id="rollHistory">
                                        <div id="rollhead">
                                                  <h3 class="theme">Roll History</h3>
                                                  <h4 onclick="clearHistory()">Clear history</h4>
                                        </div>

                              </div>

                    </main>
                    <script src="app.js"></script>
          </body>

</html>
